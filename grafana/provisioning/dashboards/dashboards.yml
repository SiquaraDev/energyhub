# Provider de dashboards do Grafana (Fase 12) — carrega os JSON de /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: EnergyHub
    orgId: 1
    folder: EnergyHub
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
