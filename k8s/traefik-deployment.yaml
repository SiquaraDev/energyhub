# Traefik — API gateway / ponto de entrada da plataforma (Fase 16). Roteia por prefixo de caminho
# para os microsserviços descobertos no Consul. Fica atrás do Ingress (borda externa do cluster).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: energyhub
  labels:
    app: traefik
    app.kubernetes.io/part-of: energyhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
        app.kubernetes.io/part-of: energyhub
    spec:
      containers:
        - name: traefik
          image: traefik:v3.1
          imagePullPolicy: IfNotPresent
          args: ["--configfile=/etc/traefik/traefik.yml"]
          ports:
            - name: web
              containerPort: 80
            - name: dashboard
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: traefik-config
              mountPath: /etc/traefik
              readOnly: true
            # htpasswd do dashboard, projetado do energyhub-secret. Caminho FORA de /etc/traefik
            # (montar dentro do mount read-only do ConfigMap nao funciona).
            - name: dashboard-auth
              mountPath: /etc/traefik-auth
              readOnly: true
      volumes:
        - name: traefik-config
          configMap:
            name: traefik-config
        # So a chave TRAEFIK_DASHBOARD_USERS vira o arquivo `users` (as demais chaves do
        # energyhub-secret NAO sao expostas ao Traefik).
        - name: dashboard-auth
          secret:
            secretName: energyhub-secret
            items:
              - key: TRAEFIK_DASHBOARD_USERS
                path: users
