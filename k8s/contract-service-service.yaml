# contract-service — Service ClusterIP (Fase 16). DNS interno `contract-service:8003`.
apiVersion: v1
kind: Service
metadata:
  name: contract-service
  namespace: energyhub
  labels:
    app: contract-service
    app.kubernetes.io/part-of: energyhub
spec:
  type: ClusterIP
  selector:
    app: contract-service
  ports:
    - name: http
      port: 8003
      targetPort: 8003
