# ServiceAccount dos 5 microsserviços — porta de entrada do pull secret do GHCR
# (harden-cicd-supply-chain).
#
# Problema que resolve: as imagens publicadas em ghcr.io/siquaradev/energyhub-*-service nascem
# PRIVADAS (confirmado: um GET anônimo no manifest devolve 401). Um cluster real não tem
# `docker login` nenhum — sem credencial o kubelet falha o pull e os pods entram em
# ImagePullBackOff. Este SA carrega a referência ao pull secret UMA vez, e os Deployments dos
# serviços apenas apontam para ele via `serviceAccountName`.
#
# Por que no ServiceAccount e não em `imagePullSecrets` de cada pod: um único ponto de verdade.
# Adicionar um registry, ou rotacionar o token, mexe só neste arquivo — não em 5 Deployments.
#
# Escopo: SÓ os 5 serviços. Os backends (postgres, redis, rabbitmq, consul, kafka,
# traefik) usam imagens públicas do Docker Hub / registries oficiais e continuam no SA `default`
# do namespace — eles não têm o que autenticar.
#
# `ghcr-pull-secret` NÃO é versionado (mesma regra de k8s/secrets/): ele contém um token do GHCR.
# Crie-o com `bash k8s/secrets/create-ghcr-pull-secret.sh` (ver k8s/secrets/README.md §🐳).
# Referenciar um Secret AUSENTE é tolerado pelo Kubernetes: o kubelet só registra um aviso e segue
# com as credenciais restantes. É por isso que o kind do CI — que pré-carrega as imagens com
# `kind load` e usa imagePullPolicy IfNotPresent — sobe normalmente sem este Secret existir.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: energyhub-sa
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
imagePullSecrets:
  - name: ghcr-pull-secret
# Estes pods não falam com a API do Kubernetes; não montar o token da SA remove um credencial
# desnecessário de dentro do container (se um serviço for comprometido, não há token de API a roubar).
automountServiceAccountToken: false
