# client-service — Service ClusterIP (Fase 16). DNS interno `client-service:8002`.
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: energyhub
  labels:
    app: client-service
    app.kubernetes.io/part-of: energyhub
spec:
  type: ClusterIP
  selector:
    app: client-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
