# NetworkPolicies (Fase de hardening) — segmentação de rede da plataforma no namespace `energyhub`.
#
# ESTRATÉGIA: default-deny de INGRESS + allow explícito de menor privilégio (allow-list).
#   1) A primeira policy nega TODO tráfego de entrada para TODOS os pods do namespace
#      (podSelector: {} + policyTypes:[Ingress] sem regras `ingress`). A partir daí, um pod só
#      aceita conexões que uma policy subsequente autorize explicitamente. Egress NÃO é restrito
#      (nenhuma policy declara policyTypes:[Egress]) — logo DNS (CoreDNS/kube-dns em kube-system),
#      saída para fora do cluster e chamadas iniciadas pelos próprios pods seguem livres.
#   2) As demais policies liberam, porta a porta, apenas os fluxos que as dependências reais exigem.
#
# MAPA policy -> dependência (origem  ->  destino:porta) — confirmado lendo os manifestos em k8s/:
#
#   Borda (gateway):        traefik            ->  auth-service:8001
#                           traefik            ->  client-service:8002
#                           traefik            ->  contract-service:8003
#                           traefik            ->  financial-service:8004
#                           traefik            ->  audit-service:8005
#   Serviço -> serviço:     client/contract/financial/audit -> auth-service:8001  (lookups /internal de usuário)
#   Banco:                  auth/client/contract/financial/audit -> postgres:5432  (database-per-service)
#   Mensageria (AMQP):      auth/client/audit  ->  rabbitmq:5672
#   Service discovery:      auth/client/contract/financial/audit -> consul:8500
#                           traefik            ->  consul:8500                     (provider consulCatalog)
#   Cache/rate-limit:       auth/client/contract/financial/audit -> redis:6379
#   Streams (Kafka):        contract/financial (producers), audit (consumer) -> kafka:9092
#                           (kafka expõe o listener PLAINTEXT :9092 aos clientes — ver k8s/base/kafka.yaml;
#                            não há 29092 aqui, esse par host/interno só existe no docker-compose)
#   Quórum KRaft:           kafka              ->  kafka:9093                      (controller, nó único; sem Zookeeper)
#   Borda externa:          ns ingress-nginx   ->  traefik:80                      (Ingress -> traefik-service)
#
# PRÉ-REQUISITO CRÍTICO: a CNI do cluster PRECISA implementar NetworkPolicy. Várias CNIs default
# IGNORAM NetworkPolicy silenciosamente (ex.: o bridge/kindnet padrão do minikube/kind sem plugin;
# Flannel puro). Sem uma CNI que aplique (Calico, Cilium, Weave, Antrea, Canal...), estes manifestos
# aplicam sem erro mas NÃO segmentam nada. Em minikube: `minikube start --cni=calico`.
#
# CAVEATS operacionais sob default-deny:
#   • Probes do kubelet (readiness/liveness) partem do IP do NÓ, não de um pod. A maioria das CNIs
#     que aplicam policy libera o host node por padrão; se as probes começarem a falhar, adicione um
#     ipBlock do CIDR dos nós OU uma policy host-network conforme a CNI.
#   • Workloads auxiliares (Jobs de seed/migração, e2e) que abrem conexão PARA os backends precisam
#     de regra própria — os `from` abaixo listam apenas os pods de aplicação por label `app`.
#   • O label do namespace do ingress controller (`kubernetes.io/metadata.name: ingress-nginx`) pode
#     precisar de AJUSTE se o NGINX Ingress rodar em outro namespace (kube-system, nginx-ingress...).
---
# 1) DEFAULT-DENY INGRESS — seleciona todos os pods do namespace e, sem nenhuma regra `ingress`,
#    bloqueia toda entrada. É a base do modelo allow-list: nada entra sem autorização explícita.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  # (sem chave `ingress:` = nega tudo)
---
# 2) auth-service:8001 — recebe do gateway (Traefik) E dos outros quatro serviços (lookups /internal
#    de usuário). Ambos os fluxos batem na mesma porta 8001, então compartilham o mesmo bloco.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [client-service, contract-service, financial-service, audit-service]
      ports:
        - protocol: TCP
          port: 8001
---
# 3) client-service:8002 — apenas o gateway roteia para ele.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-service-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: client-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - protocol: TCP
          port: 8002
---
# 4) contract-service:8003 — apenas o gateway roteia para ele.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-contract-service-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: contract-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - protocol: TCP
          port: 8003
---
# 5) financial-service:8004 — apenas o gateway roteia para ele.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-financial-service-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: financial-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - protocol: TCP
          port: 8004
---
# 6) audit-service:8005 — apenas o gateway roteia para ele.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-audit-service-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: audit-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - protocol: TCP
          port: 8005
---
# 7) postgres:5432 — banco compartilhado (um database por serviço). Só os cinco serviços conectam.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, client-service, contract-service, financial-service, audit-service]
      ports:
        - protocol: TCP
          port: 5432
---
# 8) rabbitmq:5672 (AMQP) — mensageria usada por auth, client e audit.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, client-service, audit-service]
      ports:
        - protocol: TCP
          port: 5672
---
# 9) consul:8500 (API HTTP) — registro/descoberta dos cinco serviços E leitura do catálogo pelo
#    Traefik (provider consulCatalog). Dois `from` distintos (OR) para deixar as origens explícitas.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-consul-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: consul
  policyTypes:
    - Ingress
  ingress:
    - from:
        # cinco serviços — register_with_consul no startup
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, client-service, contract-service, financial-service, audit-service]
        # gateway — lê o catálogo para montar as rotas
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - protocol: TCP
          port: 8500
---
# 10) redis:6379 — cache / rate-limit dos cinco serviços.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, client-service, contract-service, financial-service, audit-service]
      ports:
        - protocol: TCP
          port: 6379
---
# 11) kafka — modo KRaft (k8s-production-robustness): SEM Zookeeper.
#     • :9092 (PLAINTEXT) — contract/financial publicam (producers), audit consome.
#     • :9093 (CONTROLLER) — quórum de metadados do KRaft. Como é um nó único, o broker fala com o
#       PRÓPRIO controller (kafka-0.kafka-headless:9093, que resolve para o IP do próprio pod).
#       Sob default-deny, num CNI que aplica policy ao tráfego pod→próprio-IP (Calico/Cilium), sem
#       esta regra o quórum não forma e o broker nunca sobe. Liberado de `app: kafka` para si mesmo.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [contract-service, financial-service, audit-service]
      ports:
        - protocol: TCP
          port: 9092
    # Quórum KRaft — o broker alcança o próprio controller (:9093).
    - from:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9093
---
# 13) traefik:80 — borda da plataforma. O tráfego externo chega pelo NGINX Ingress, que roda em
#     OUTRO namespace (ingress-nginx). Como as policies aqui só selecionam pods de `energyhub`, e o
#     ingress controller é externo ao namespace, liberamos por namespaceSelector.
#     AJUSTE o label caso o controller rode em namespace diferente (kube-system, nginx-ingress...).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress-from-nginx
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  podSelector:
    matchLabels:
      app: traefik
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
