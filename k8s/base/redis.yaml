# Redis in-cluster (Fase 16) — cache/rate-limit dos serviços. Endereçado por `redis-service:6379`.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: energyhub
  labels:
    app: redis
    app.kubernetes.io/part-of: energyhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: energyhub
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: energyhub
  labels:
    app: redis
    app.kubernetes.io/part-of: energyhub
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: energyhub
  labels:
    app: redis
    app.kubernetes.io/part-of: energyhub
spec:
  # Desacopla o dado do ciclo de vida do pod: um crash/upgrade/reschedule nao apaga mais o volume.
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
  # storageClassName omitido -> classe DEFAULT do cluster (dev/kind/minikube). O overlay prod define
  # uma classe explicita (data-persistence exige classe explicita em prod).
