# financial-service — Service ClusterIP (Fase 16). DNS interno `financial-service:8004`.
apiVersion: v1
kind: Service
metadata:
  name: financial-service
  namespace: energyhub
  labels:
    app: financial-service
    app.kubernetes.io/part-of: energyhub
spec:
  type: ClusterIP
  selector:
    app: financial-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
