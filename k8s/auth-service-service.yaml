# auth-service — Service ClusterIP (Fase 16). DNS interno estável `auth-service:8001`; seleciona
# os pods por label e balanceia só entre os prontos (readiness). Não exposto externamente.
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: energyhub
  labels:
    app: auth-service
    app.kubernetes.io/part-of: energyhub
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
