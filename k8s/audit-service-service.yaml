# audit-service — Service ClusterIP (Fase 16). DNS interno `audit-service:8005`.
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: energyhub
  labels:
    app: audit-service
    app.kubernetes.io/part-of: energyhub
spec:
  type: ClusterIP
  selector:
    app: audit-service
  ports:
    - name: http
      port: 8005
      targetPort: 8005
