# Secret — valores SENSÍVEIS (Fase 16). Como o app lê `DATABASE_URL`/`RABBITMQ_URL` como uma
# única string que EMBUTE a senha, a URL inteira é tratada como sensível e vive aqui (não no
# ConfigMap) — assim a senha nunca aparece em manifesto de Deployment nem em ConfigMap.
#
# ⚠️ Segurança: `Secret` do Kubernetes é apenas base64 (NÃO é criptografia). Estes são
#    PLACEHOLDERS de desenvolvimento — rotacionar `SECRET_KEY`/senhas e migrar para um secret
#    manager real (Vault/sealed-secrets) antes de produção. Nunca commitar credenciais reais.
apiVersion: v1
kind: Secret
metadata:
  name: energyhub-secret
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
type: Opaque
stringData:
  # JWT — a MESMA chave em todos os serviços (auth assina, os demais validam).
  SECRET_KEY: "change-me-in-production"
  # Senhas isoladas (consumidas pelos Deployments dos backends stateful).
  POSTGRES_PASSWORD: "energyhub123"
  RABBITMQ_PASSWORD: "energyhub123"
  # URLs com credencial embutida — um banco por serviço (database-per-service, Fase 15).
  AUTH_DATABASE_URL: "postgresql+asyncpg://energyhub:energyhub123@postgres-service:5432/authdb"
  CLIENT_DATABASE_URL: "postgresql+asyncpg://energyhub:energyhub123@postgres-service:5432/clientdb"
  CONTRACT_DATABASE_URL: "postgresql+asyncpg://energyhub:energyhub123@postgres-service:5432/contractdb"
  FINANCIAL_DATABASE_URL: "postgresql+asyncpg://energyhub:energyhub123@postgres-service:5432/financialdb"
  AUDIT_DATABASE_URL: "postgresql+asyncpg://energyhub:energyhub123@postgres-service:5432/auditdb"
  # Mensageria — RabbitMQ (auth/client/audit).
  RABBITMQ_URL: "amqp://energyhub:energyhub123@rabbitmq-service:5672/"
