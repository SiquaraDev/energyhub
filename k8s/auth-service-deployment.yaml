# auth-service — Deployment (Fase 16). Serviço raiz de identidade (:8001, authdb).
#
# Config injetada em três camadas:
#   • envFrom energyhub-config      → ENVIRONMENT, CONSUL_HOST, CONSUL_PORT (comum)
#   • envFrom auth-service-config   → APP_NAME, APP_PORT, SERVICE_HOST, REDIS_HOST, REDIS_PORT
#   • valueFrom energyhub-secret    → DATABASE_URL (authdb), RABBITMQ_URL, SECRET_KEY (sensível)
# O mesmo ConfigMap ainda é MONTADO como volume em /app/config (requisito de config-as-volume).
#
# Self-healing: replicas:2 mantém o par; liveness reinicia pod travado; readiness só libera
# tráfego após /health passar. imagePullPolicy IfNotPresent usa a imagem local (sem registry).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: energyhub
  labels:
    app: auth-service
    app.kubernetes.io/part-of: energyhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/part-of: energyhub
    spec:
      # Desliga as env vars estilo docker-links que o k8s injeta para cada Service (ex.:
      # AUTH_SERVICE_PORT=tcp://10.x:8001) — elas colidem com os campos `*_service_port` do
      # Settings (pydantic) e quebram o parse int. O app usa DNS/Consul + os defaults corretos.
      enableServiceLinks: false
      containers:
        - name: auth-service
          image: energyhub-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: energyhub-config
            - configMapRef:
                name: auth-service-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: energyhub-secret
                  key: AUTH_DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: energyhub-secret
                  key: RABBITMQ_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: energyhub-secret
                  key: SECRET_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: energyhub-secret
                  key: INTERNAL_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          volumeMounts:
            - name: service-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: service-config
          configMap:
            name: auth-service-config
