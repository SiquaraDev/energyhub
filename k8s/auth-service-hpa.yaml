# auth-service — HorizontalPodAutoscaler (Fase 16). Escala 2→5 réplicas por utilização de CPU
# (alvo 70%) e memória (alvo 80%), servidas pelo Metrics Server. O count fica sempre em [min,max].
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: energyhub
  labels:
    app: auth-service
    app.kubernetes.io/part-of: energyhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
