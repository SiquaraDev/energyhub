# Template UNSEALED do `energyhub-secret` — ponto de partida do fluxo de selagem (harden-security).
#
# ⚠️  Este arquivo É COMMITADO, mas contém apenas placeholders `REPLACE_ME_*` (nada sensível).
#     NÃO edite este arquivo com valores reais. O fluxo correto é:
#       1. cp energyhub-secret.local.example.yaml energyhub-secret.local.yaml
#       2. preencha o `.local.yaml` (que é GITIGNORED) com valores gerados por `openssl`
#       3. sele com `bash k8s/secrets/seal-secrets.sh` → energyhub-sealedsecret.yaml (cifrado, commitável)
#
# Geração dos valores:
#   • SECRET_KEY / INTERNAL_API_KEY  → openssl rand -hex 32   (64 chars hex)
#   • POSTGRES_PASSWORD / RABBITMQ_PASSWORD → openssl rand -base64 24
#   A senha do Postgres deve ser a MESMA em POSTGRES_PASSWORD e embutida em cada *_DATABASE_URL.
#
# As chaves abaixo são o CONTRATO consumido pelos Deployments via secretKeyRef → não renomear.
apiVersion: v1
kind: Secret
metadata:
  name: energyhub-secret
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
type: Opaque
stringData:
  # JWT — a MESMA chave em todos os serviços (auth assina, os demais validam).
  SECRET_KEY: "REPLACE_ME_openssl_rand_hex_32"
  # Chamadas serviço-a-serviço (endpoints /internal, forwardAuth de borda).
  INTERNAL_API_KEY: "REPLACE_ME_openssl_rand_hex_32"
  # htpasswd do dashboard do Traefik (formato `usuario:hash`), projetado como arquivo em
  # /etc/traefik-auth/users pelo Deployment do Traefik. Gere o hash com:
  #     openssl passwd -apr1 'SUA_SENHA'
  # e monte o valor como `energyhub:<hash>`. Sem esta chave o pod do Traefik não sobe.
  TRAEFIK_DASHBOARD_USERS: "energyhub:REPLACE_ME_openssl_passwd_apr1_hash"
  # Senhas isoladas (consumidas pelos Deployments dos backends stateful).
  POSTGRES_PASSWORD: "REPLACE_ME_openssl_rand_base64_24"
  RABBITMQ_PASSWORD: "REPLACE_ME_openssl_rand_base64_24"
  # URLs com credencial embutida — um banco por serviço (database-per-service).
  # Troque REPLACE_ME_POSTGRES_PASSWORD pela MESMA senha de POSTGRES_PASSWORD acima.
  AUTH_DATABASE_URL: "postgresql+asyncpg://energyhub:REPLACE_ME_POSTGRES_PASSWORD@postgres-service:5432/authdb"
  CLIENT_DATABASE_URL: "postgresql+asyncpg://energyhub:REPLACE_ME_POSTGRES_PASSWORD@postgres-service:5432/clientdb"
  CONTRACT_DATABASE_URL: "postgresql+asyncpg://energyhub:REPLACE_ME_POSTGRES_PASSWORD@postgres-service:5432/contractdb"
  FINANCIAL_DATABASE_URL: "postgresql+asyncpg://energyhub:REPLACE_ME_POSTGRES_PASSWORD@postgres-service:5432/financialdb"
  AUDIT_DATABASE_URL: "postgresql+asyncpg://energyhub:REPLACE_ME_POSTGRES_PASSWORD@postgres-service:5432/auditdb"
  # Mensageria — RabbitMQ. Troque REPLACE_ME_RABBITMQ_PASSWORD pela MESMA senha de RABBITMQ_PASSWORD.
  RABBITMQ_URL: "amqp://energyhub:REPLACE_ME_RABBITMQ_PASSWORD@rabbitmq-service:5672/"
