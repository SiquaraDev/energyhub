# Alternativa ao SealedSecret — External Secrets Operator (ESO) com backend HashiCorp Vault.
#
# Em vez de cifrar e commitar, os valores vivem NO VAULT (fora do git). O ESO lê o Vault e
# MATERIALIZA o Secret `energyhub-secret` no cluster, mantendo-o sincronizado (refreshInterval).
# O repositório guarda apenas o MAPEAMENTO abaixo — nada sensível, nem cifrado.
#
# Pré-requisitos:
#   • External Secrets Operator instalado (helm repo external-secrets → helm install).
#   • Um Vault acessível pelo cluster, com KV v2 populado (ver k8s/secrets/README.md §🅱️):
#       vault kv put secret/energyhub/platform SECRET_KEY=... INTERNAL_API_KEY=... (etc.)
#   • ServiceAccount `external-secrets-sa` no namespace, atrelada a uma role Kubernetes no Vault.
#
# As chaves materializadas são o CONTRATO consumido pelos Deployments via secretKeyRef → não renomear.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: energyhub-vault-store
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  provider:
    vault:
      # Endereço do Vault alcançável de dentro do cluster (ajuste ao seu ambiente).
      server: "https://vault.energyhub.local:8200"
      # Mount do KV v2 e versão do engine.
      path: "secret"
      version: "v2"
      auth:
        # Autenticação via Kubernetes: o ESO troca o token da ServiceAccount por um token Vault.
        kubernetes:
          mountPath: "kubernetes"
          role: "energyhub"
          serviceAccountRef:
            name: "external-secrets-sa"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: energyhub-secret
  namespace: energyhub
  labels:
    app.kubernetes.io/part-of: energyhub
spec:
  # Reconciliação: o ESO relê o Vault a cada hora e reconcilia o Secret.
  refreshInterval: "1h"
  secretStoreRef:
    name: energyhub-vault-store
    kind: SecretStore
  target:
    # Materializa EXATAMENTE o Secret que os Deployments consomem.
    name: energyhub-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: energyhub
  # Uma entrada por chave do contrato. `remoteRef.key` = caminho no KV v2;
  # `property` = campo dentro daquele segredo (aqui, tudo sob secret/energyhub/platform).
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: energyhub/platform
        property: SECRET_KEY
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: energyhub/platform
        property: INTERNAL_API_KEY
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: energyhub/platform
        property: POSTGRES_PASSWORD
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: energyhub/platform
        property: RABBITMQ_PASSWORD
    - secretKey: AUTH_DATABASE_URL
      remoteRef:
        key: energyhub/platform
        property: AUTH_DATABASE_URL
    - secretKey: CLIENT_DATABASE_URL
      remoteRef:
        key: energyhub/platform
        property: CLIENT_DATABASE_URL
    - secretKey: CONTRACT_DATABASE_URL
      remoteRef:
        key: energyhub/platform
        property: CONTRACT_DATABASE_URL
    - secretKey: FINANCIAL_DATABASE_URL
      remoteRef:
        key: energyhub/platform
        property: FINANCIAL_DATABASE_URL
    - secretKey: AUDIT_DATABASE_URL
      remoteRef:
        key: energyhub/platform
        property: AUDIT_DATABASE_URL
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: energyhub/platform
        property: RABBITMQ_URL
