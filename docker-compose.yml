# EnergyHub — orquestração completa da stack (Fase 14).
#
# `docker compose up -d` sobe a API (imagem construída pelo Dockerfile) + PostgreSQL, Redis,
# RabbitMQ, Kafka+Zookeeper, Elasticsearch, Prometheus, Grafana e Alertmanager, todos numa rede
# bridge compartilhada (`energyhub-network`). A API só inicia depois das dependências com health
# check reportarem `healthy` (depends_on). Toda configuração é injetada por variável de ambiente.
#
# 🔐 Segurança (harden-security-credentials): NÃO há credencial embutida. `SECRET_KEY`, as senhas
#    de Postgres/RabbitMQ e o admin do Grafana são lidos de variáveis de ambiente via `.env` (use
#    `${VAR:?}` → o boot falha se a variável não estiver definida). Copie `.env.example` para `.env`
#    e gere valores próprios (`openssl rand -hex 32`). `ENVIRONMENT` é `development` por padrão nesta
#    stack local; em produção (Kubernetes) os valores vêm de um Secret e a guarda de produção aborta
#    o boot diante de qualquer placeholder. Nunca commite o `.env`.
#    Primeiro boot com banco vazio: `docker compose exec energyhub-api alembic upgrade head`.
services:
  # Aplicação EnergyHub (FastAPI/uvicorn :8000) — Fase 14.
  energyhub-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: energyhub:latest
    container_name: energyhub-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Twelve-factor: todas as URLs endereçam as dependências pelo NOME do serviço (não localhost).
      DATABASE_URL: postgresql+asyncpg://energyhub:${POSTGRES_PASSWORD}@postgres:5432/energyhub
      # A app deriva `redis_url` de REDIS_HOST/REDIS_PORT; REDIS_URL fica documentado (twelve-factor).
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://energyhub:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092   # listener interno da rede (host usa localhost:9092)
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env (veja .env.example)}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - energyhub-network

  postgres:
    image: postgres:16-alpine
    container_name: energyhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: energyhub
      POSTGRES_USER: ${POSTGRES_USER:-energyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env (veja .env.example)}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energyhub -d energyhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energyhub-network

  redis:
    image: redis:7-alpine
    container_name: energyhub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]   # persistência AOF
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energyhub-network

  # Mensageria — RabbitMQ (workflows por entidade, roteamento e ack manual) — Fase 10.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: energyhub-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-energyhub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?defina RABBITMQ_PASSWORD no .env (veja .env.example)}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # UI de gerenciamento
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energyhub-network

  # Mensageria — Zookeeper (coordenação do broker Kafka) — Fase 10.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: energyhub-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - energyhub-network

  # Busca — Elasticsearch (full-text, relevância, fuzziness) — Fase 11.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: energyhub-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m   # heap limitado (dev single-node)
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s   # ES leva ~20-30s p/ subir; falhas antes disso não contam
    networks:
      - energyhub-network

  # Mensageria — Kafka (streams de alto volume, partições e consumer groups) — Fase 10.
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: energyhub-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dois listeners: interno (kafka:29092, para clientes na rede do compose — inclui a API) e
      # host (localhost:9092, para clientes na máquina hospedeira).
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s   # Kafka leva ~30-40s p/ conectar ao Zookeeper e aceitar conexões
    networks:
      - energyhub-network

  # Service discovery — Consul (registro + health checks + resolução por nome) — Fase 15.
  consul:
    image: hashicorp/consul:1.19
    container_name: energyhub-consul
    restart: unless-stopped
    command: agent -server -bootstrap -ui -client=0.0.0.0
    ports:
      - "8500:8500"       # UI + HTTP API
      - "8600:8600/udp"   # DNS
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energyhub-network

  # ===== Microsserviços (Fase 15) — cada um dono do seu banco, registrado no Consul =====
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    image: energyhub-auth-service:latest
    container_name: energyhub-auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      APP_PORT: "8001"
      SERVICE_HOST: auth-service
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DATABASE_URL: postgresql+asyncpg://energyhub:${POSTGRES_PASSWORD}@postgres:5432/authdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_URL: amqp://energyhub:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env (veja .env.example)}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/v1/auth`) || PathPrefix(`/api/v1/users`) || PathPrefix(`/api/v1/roles`) || PathPrefix(`/api/v1/permissions`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.middlewares=eh-ratelimit"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"
      # Middlewares de borda (definidos aqui; aplicáveis por qualquer router):
      - "traefik.http.middlewares.eh-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.eh-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.eh-auth.forwardauth.address=http://auth-service:8001/internal/auth/verify"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - energyhub-network

  client-service:
    build:
      context: ./services/client-service
      dockerfile: Dockerfile
    image: energyhub-client-service:latest
    container_name: energyhub-client-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      APP_PORT: "8002"
      SERVICE_HOST: client-service
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DATABASE_URL: postgresql+asyncpg://energyhub:${POSTGRES_PASSWORD}@postgres:5432/clientdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_URL: amqp://energyhub:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env}   # mesma chave do Auth (valida o JWT)
      ENVIRONMENT: ${ENVIRONMENT:-development}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clients.rule=PathPrefix(`/api/v1/clients`)"
      - "traefik.http.routers.clients.entrypoints=web"
      - "traefik.http.routers.clients.middlewares=eh-ratelimit,eh-auth"
      - "traefik.http.services.clients.loadbalancer.server.port=8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - energyhub-network

  contract-service:
    build:
      context: ./services/contract-service
      dockerfile: Dockerfile
    image: energyhub-contract-service:latest
    container_name: energyhub-contract-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      APP_PORT: "8003"
      SERVICE_HOST: contract-service
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DATABASE_URL: postgresql+asyncpg://energyhub:${POSTGRES_PASSWORD}@postgres:5432/contractdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # RabbitMQ: este serviço publica no Kafka os eventos de negócio, mas a TRILHA DE AUDITORIA
      # (fix-microservices-gaps) vai para a fila `audit` do RabbitMQ — daí precisar da URL aqui.
      RABBITMQ_URL: amqp://energyhub:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.contracts.rule=PathPrefix(`/api/v1/contracts`)"
      - "traefik.http.routers.contracts.entrypoints=web"
      - "traefik.http.routers.contracts.middlewares=eh-ratelimit,eh-auth"
      - "traefik.http.services.contracts.loadbalancer.server.port=8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      consul:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - energyhub-network

  financial-service:
    build:
      context: ./services/financial-service
      dockerfile: Dockerfile
    image: energyhub-financial-service:latest
    container_name: energyhub-financial-service
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      APP_PORT: "8004"
      SERVICE_HOST: financial-service
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DATABASE_URL: postgresql+asyncpg://energyhub:${POSTGRES_PASSWORD}@postgres:5432/financialdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # RabbitMQ: eventos de negócio vão pro Kafka, mas a TRILHA DE AUDITORIA
      # (fix-microservices-gaps) publica na fila `audit` do RabbitMQ.
      RABBITMQ_URL: amqp://energyhub:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.invoices.rule=PathPrefix(`/api/v1/invoices`)"
      - "traefik.http.routers.invoices.entrypoints=web"
      - "traefik.http.routers.invoices.middlewares=eh-ratelimit,eh-auth"
      - "traefik.http.services.invoices.loadbalancer.server.port=8004"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
      consul: {condition: service_healthy}
      auth-service: {condition: service_started}
    networks:
      - energyhub-network

  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    image: energyhub-audit-service:latest
    container_name: energyhub-audit-service
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      APP_PORT: "8005"
      SERVICE_HOST: audit-service
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DATABASE_URL: postgresql+asyncpg://energyhub:${POSTGRES_PASSWORD}@postgres:5432/auditdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_URL: amqp://energyhub:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audit.rule=PathPrefix(`/api/v1/audit-logs`)"
      - "traefik.http.routers.audit.entrypoints=web"
      - "traefik.http.routers.audit.middlewares=eh-ratelimit,eh-auth"
      - "traefik.http.services.audit.loadbalancer.server.port=8005"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
      consul: {condition: service_healthy}
      auth-service: {condition: service_started}
    networks:
      - energyhub-network

  # Observabilidade — Prometheus (coleta/armazenamento de métricas) — Fase 12.
  # Agora a API roda na stack; o Prometheus a scrapeia por nome de serviço (energyhub-api:8000).
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: energyhub-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks:
      - energyhub-network

  # Observabilidade — Grafana (dashboards) — Fase 12. Data source + dashboards provisionados.
  grafana:
    image: grafana/grafana:11.2.0
    container_name: energyhub-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?defina GRAFANA_ADMIN_USER no .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?defina GRAFANA_ADMIN_PASSWORD no .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - energyhub-network

  # Observabilidade — Alertmanager (roteamento/notificação de alertas) — Fase 12.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: energyhub-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - energyhub-network

  # API Gateway — Traefik (Fase 15). Ponto de entrada único; roteia por prefixo de caminho via
  # providers Docker + Consul-catalog; aplica middlewares de borda (logging, rate limit, forwardAuth).
  traefik:
    image: traefik:v3.1
    container_name: energyhub-traefik
    restart: unless-stopped
    command:
      - "--configfile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"       # gateway (entrada única externa)
      - "8090:8080"   # dashboard do Traefik (dev)
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - energyhub-network

networks:
  energyhub-network:
    name: energyhub-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  consul_data:
