# Deploy — aplica os manifestos k8s/ num cluster REAL e verifica o rollout — Fase 17 · CD.
# Roda em push para main/master. Requer o secret KUBE_CONFIG (kubeconfig do cluster alvo).
#
# Sem KUBE_CONFIG o job de deploy é PULADO (verde), não falha — assim o repo fica pronto para
# plugar um cluster (EKS/GKE/Oracle/etc.) quando existir, sem quebrar o CI enquanto não há um.
# A validação de deploy GRÁTIS e efêmera (kind no runner) fica no pipeline combinado ci-cd.yml.
#
# Supply chain (harden-cicd-supply-chain): actions fixadas por SHA imutável + release em comentário;
# Dependabot mantém os pins frescos.
name: Deploy

on:
  push:
    branches: [main, master]

permissions:
  contents: read

# Um push mais novo no mesmo ref cancela o run em voo. Crítico num workflow de DEPLOY: sem o guard,
# dois commits em sequência disputariam o cluster REAL e o rollout do mais antigo poderia vencer.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Secrets não podem ser usados em `if:`; um job-gate mapeia o secret para env e emite um output
  # booleano, e o job de deploy usa `needs: gate` + `if:` sobre esse output para pular limpo.
  gate:
    runs-on: ubuntu-latest
    outputs:
      has_kubeconfig: ${{ steps.check.outputs.has_kubeconfig }}
    steps:
      - id: check
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -n "$KUBE_CONFIG" ]; then
            echo "has_kubeconfig=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_kubeconfig=false" >> "$GITHUB_OUTPUT"
            echo "::notice::KUBE_CONFIG ausente — deploy pulado (configure o secret para habilitar)."
          fi

  deploy:
    needs: gate
    if: needs.gate.outputs.has_kubeconfig == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # só inspeciona/puxa as imagens SHA do GHCR
    # env de job (não de step) para o guard `if: env.SLACK_WEBHOOK_URL != ''` funcionar.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure kubectl from secret
        uses: Azure/k8s-set-context@8698eba2499e9012f0d5085f8798077cce4bc526 # v5.0.1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
          # Se o secret estiver em base64, descomente:
          # kubeconfig-encoding: base64

      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      # Namespace PRIMEIRO: garante o namespace existindo antes dos preflights de Secret e do
      # `apply -k` (que traz o ServiceAccount + todo o resto do overlay prod). Caminho agora sob base/.
      - name: Apply namespace
        run: kubectl apply -f k8s/base/namespace.yaml

      # `energyhub-secret` NAO e versionado (harden-security-credentials): num cluster real ele vem
      # de um SealedSecret/ExternalSecret (ver k8s/secrets/), aplicado FORA desta esteira. Sem ele os
      # pods ficam em CreateContainerConfigError e o deploy so falharia adiante por timeout — este
      # preflight troca isso por um erro imediato e explicito.
      - name: "Preflight: energyhub-secret must exist"
        run: |
          if ! kubectl -n energyhub get secret energyhub-secret >/dev/null 2>&1; then
            echo "::error::Secret 'energyhub-secret' ausente no namespace energyhub."
            echo "Aplique o SealedSecret/ExternalSecret antes do deploy — veja k8s/secrets/README.md."
            exit 1
          fi
          echo "energyhub-secret presente"

      # Mesma lógica do preflight acima, para a credencial de PULL: `ghcr-pull-secret` também não é
      # versionado (contém um token do GHCR) e é provisionado FORA desta esteira por
      # k8s/secrets/create-ghcr-pull-secret.sh. Sem ele, as imagens privadas do GHCR não descem e
      # cada serviço cai em ImagePullBackOff — o `rollout status` só falharia lá na frente, por
      # timeout de 300s x 6 deployments. Este preflight troca essa espera cega por um erro imediato.
      - name: "Preflight: ghcr-pull-secret must exist"
        run: |
          if ! kubectl -n energyhub get secret ghcr-pull-secret >/dev/null 2>&1; then
            echo "::error::Secret 'ghcr-pull-secret' ausente no namespace energyhub."
            echo "Crie-o com k8s/secrets/create-ghcr-pull-secret.sh — veja k8s/secrets/README.md."
            echo "(Alternativa: tornar os pacotes GHCR publicos e remover imagePullSecrets do SA.)"
            exit 1
          fi
          echo "ghcr-pull-secret presente"

      # docker.yml roda em paralelo (mesmo push) e pode ainda não ter publicado as imagens SHA. O
      # apply do overlay prod referencia ghcr.io/.../<sha>, então as imagens PRECISAM existir ANTES
      # do apply — senão os pods caem em ImagePullBackOff. Login (imagens privadas) + espera vêm
      # primeiro. (cert-manager/ e secrets/ seguem FORA da base — dependem de controllers/segredos.)
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for images (SHA) to be published
        run: |
          for s in auth client contract financial audit; do
            ref="ghcr.io/${OWNER}/energyhub-${s}-service:${GITHUB_SHA}"
            found=""
            for i in $(seq 1 20); do
              if docker manifest inspect "$ref" >/dev/null 2>&1; then found=1; echo "found $ref"; break; fi
              echo "waiting for $ref ($i/20)..."; sleep 15
            done
            [ -n "$found" ] || { echo "::error::timeout esperando $ref (o build de imagens publicou?)"; exit 1; }
          done

      # Deploy DECLARATIVO via Kustomize (k8s-production-robustness): injeta o commit SHA no
      # `images:` transformer do overlay prod e aplica com `-k`. A imagem que roda vira propriedade
      # do manifesto renderizado — SEM `kubectl set image`. `kubectl kustomize` (embutido no kubectl)
      # mostra o SHA exato antes do apply; nada de binário `kustomize` externo (que seria mais um
      # download não-fixado, contra o endurecimento de supply-chain da mudança anterior).
      #
      # A injeção é um `sed` escopado: no overlay prod SÓ as 5 entradas de serviço têm `newTag:`
      # (o gateway fica fora do bloco images: do prod), e todas recebem o MESMO SHA — que é o correto,
      # os 5 serviços são publicados no mesmo commit. O ServiceAccount vem no apply (kubectl ordena
      # ServiceAccount antes de Deployment), então os pods já resolvem o imagePullSecrets do GHCR.
      - name: Render prod overlay with this commit SHA and apply
        run: |
          sed -i "s|^\( *newTag: \).*|\1${GITHUB_SHA}|" k8s/overlays/prod/kustomization.yaml
          echo "Imagens que serão aplicadas:"
          kubectl kustomize k8s/overlays/prod | grep -E "image: ghcr" | sort -u
          kubectl apply -k k8s/overlays/prod

      # Verifica o rollout e FALHA se algum não completar (dispara rollback). Inclui o StatefulSet do
      # Kafka (KRaft) — `rollout status` funciona em StatefulSet, e é aqui, num cluster REAL, que a
      # prontidão do broker KRaft é de fato exercitada (o kind do CI não aguarda o Kafka).
      - name: Verify rollout
        run: |
          for d in auth-service client-service contract-service financial-service audit-service traefik; do
            kubectl -n energyhub rollout status "deployment/${d}" --timeout=300s
          done
          kubectl -n energyhub rollout status statefulset/kafka --timeout=300s

      - name: Wait for availability
        run: |
          kubectl -n energyhub wait --for=condition=available --timeout=300s \
            deployment/auth-service deployment/client-service deployment/traefik

      # Self-healing: qualquer falha acima reverte os serviços para a revisão anterior boa.
      - name: Rollback on failure
        if: failure()
        run: |
          for s in auth client contract financial audit; do
            kubectl -n energyhub rollout undo "deployment/${s}-service" || true
          done

      # Notifica no Slack só em falha e só se o webhook estiver configurado (no-op sem o secret).
      - name: Notify Slack on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: ":x: EnergyHub deploy FALHOU em `${{ github.ref_name }}` (${{ github.sha }}) — rollback acionado. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
