# Build — compila o pacote, roda a suíte de testes e reporta cobertura (Fase 17 · CI).
# Roda em push para main/master/develop e em PR para main/master. Opera no projeto monólito
# (`energyhub/`), onde vivem o pyproject/poetry.lock e a suíte de testes (Fase 13).
name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: energyhub
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # snok/install-poetry DEPOIS do setup-python (ordem do README oficial quando NÃO se usa o
      # cache 'poetry' do setup-python) — evita "poetry: command not found" na resolução de cache.
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: energyhub/.venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('energyhub/poetry.lock') }}

      # `poetry env use python` fixa o venv na 3.12 do setup-python (senão o Poetry pode herdar
      # o Python de sistema do runner) antes de instalar as dependências.
      - name: Install dependencies
        run: |
          poetry env use python
          poetry install --no-interaction

      - name: Build package
        run: poetry build

      # A suíte roda unit + componente; a integração (Postgres/Redis/RabbitMQ) é skip-guarded e se
      # pula aqui (sem infra), ficando ~85% de cobertura — acima do gate de 80% embutido no addopts.
      - name: Run tests with coverage
        run: poetry run pytest --cov=energyhub --cov-report=xml

      # Upload ao Codecov. token: exigido mesmo em repo público desde o codecov-action v4; sem o
      # secret CODECOV_TOKEN o upload é tentado mas NÃO derruba o build (fail_ci_if_error: false).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: energyhub/coverage.xml
          fail_ci_if_error: false
