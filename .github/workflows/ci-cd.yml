# CI/CD Pipeline — esteira completa encadeada por `needs` — Fase 17.
#   build-and-test → build-and-push → deploy
# É o caminho ponta-a-ponta gated para main/master, e a VALIDAÇÃO DE DEPLOY GRÁTIS: o job `deploy`
# sobe um cluster kind EFÊMERO no próprio runner, carrega as imagens recém-publicadas, aplica
# k8s/ e confere rollout + rollback — sem depender de nenhum cluster externo 24/7.
# (O deploy num cluster REAL fica em deploy.yml, atrás do secret KUBE_CONFIG.)
#
# Supply chain (harden-cicd-supply-chain): actions fixadas por SHA imutável + release em comentário;
# Dependabot mantém os pins frescos. As imagens publicadas carregam provenance + SBOM.
name: CI/CD Pipeline

on:
  push:
    branches: [main, master]

# Escopo mínimo por padrão; cada job eleva só o que precisa (packages: write no push, read no deploy).
permissions:
  contents: read

# Um push mais novo no mesmo ref cancela o run em voo. Crítico AQUI: esta esteira faz DEPLOY — sem
# o guard, dois commits em sequência disputariam o mesmo cluster e o mais antigo poderia vencer.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Estágio 1: build + testes (gate de qualidade) --------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: energyhub
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: energyhub_test
          POSTGRES_USER: energyhub
          POSTGRES_PASSWORD: energyhub123
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U energyhub -d energyhub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          virtualenvs-in-project: true
      - name: Install dependencies
        run: |
          poetry env use python
          poetry install --no-interaction
      - name: Build package
        run: poetry build
      # O monólito cria o schema por MIGRAÇÕES (não por create_all no boot). Sem isto, a integração
      # roda contra um Postgres vazio (o service container É alcançável no runner) e falha com
      # "relation does not exist". alembic/env.py é async-aware (usa asyncpg + settings.database_url).
      - name: Apply database schema (migrations)
        env:
          DATABASE_URL: postgresql+asyncpg://energyhub:energyhub123@localhost:5433/energyhub_test
        run: poetry run alembic upgrade head
      - name: Run tests against service containers
        env:
          DATABASE_URL: postgresql+asyncpg://energyhub:energyhub123@localhost:5433/energyhub_test
          REDIS_URL: redis://localhost:6380/0
          REDIS_HOST: localhost
          REDIS_PORT: "6380"
        run: poetry run pytest --cov=energyhub --cov-report=xml

  # ---- Estágio 2: build + push das 5 imagens no GHCR --------------------------------------------
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, client-service, contract-service, financial-service, audit-service]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: latest
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/energyhub-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Attestations SLSA (ver docker.yml): aqui o push é incondicional, então são sempre geradas.
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ---- Estágio 3: deploy validado num kind efêmero (grátis, autocontido) ------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # só puxa as imagens do GHCR (não publica)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      # Libera espaço em disco (runners lotam ~14GB; imagens + kind node estouram sem isto).
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true

      # cluster_name EXPLÍCITO: o default do helm/kind-action é `chart-testing`, e `kind load`
      # assume `--name kind` → sem isto as imagens caem no cluster errado (ImagePullBackOff).
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: energyhub

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Puxa as imagens recém-publicadas (tag SHA), renomeia para o nome que os manifestos esperam
      # (energyhub-<svc>-service:latest, imagePullPolicy IfNotPresent) e carrega no kind.
      - name: Load service images into kind
        run: |
          for s in auth client contract financial audit; do
            src="ghcr.io/${OWNER}/energyhub-${s}-service:${GITHUB_SHA}"
            dst="energyhub-${s}-service:latest"
            docker pull "$src"
            docker tag "$src" "$dst"
            kind load docker-image "$dst" --name energyhub
          done

      # Namespace primeiro: o dry-run server-side dos recursos namespaced exige o namespace existindo.
      # O ServiceAccount vem junto e ANTES dos Deployments de propósito: `kubectl apply -f k8s/`
      # aplica em ordem ALFABÉTICA, então serviceaccount.yaml chegaria depois de audit/auth/... e os
      # ReplicaSets ficariam em "error looking up service account" até ele existir. Eles se
      # recuperariam sozinhos, mas aplicar antes evita o ruído e a corrida.
      - name: Create namespace and ServiceAccount
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml

      # Pull secret do GHCR a partir do GITHUB_TOKEN EFÊMERO deste run (expira no fim dele) — não
      # um PAT de longa duração. `packages: read` no job já basta: ele só puxa, nunca publica.
      # Num cluster real este Secret vem de `k8s/secrets/create-ghcr-pull-secret.sh`.
      - name: Create GHCR pull secret (CI only)
        run: |
          kubectl -n energyhub create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # `energyhub-secret` NAO e mais versionado (harden-security-credentials): num cluster real ele
      # e materializado por um SealedSecret/ExternalSecret (ver k8s/secrets/). No kind EFEMERO do CI
      # geramos credenciais aleatorias e criamos o Secret imperativamente — nada sensivel entra no
      # repositorio. Valores aleatorios tambem satisfazem a guarda de producao (o ConfigMap usa
      # ENVIRONMENT=production, que aborta o boot com credencial vazia/placeholder). As URLs embutem
      # a senha, entao usam o MESMO valor consumido por postgres.yaml/rabbitmq.yaml.
      - name: Create ephemeral energyhub-secret (CI only)
        run: |
          PG_PW="$(openssl rand -hex 16)"
          MQ_PW="$(openssl rand -hex 16)"
          DASH_HASH="$(openssl passwd -apr1 "$(openssl rand -hex 12)")"
          kubectl -n energyhub create secret generic energyhub-secret             --from-literal=SECRET_KEY="$(openssl rand -hex 32)"             --from-literal=INTERNAL_API_KEY="$(openssl rand -hex 32)"             --from-literal=TRAEFIK_DASHBOARD_USERS="energyhub:${DASH_HASH}"             --from-literal=POSTGRES_PASSWORD="${PG_PW}"             --from-literal=RABBITMQ_PASSWORD="${MQ_PW}"             --from-literal=AUTH_DATABASE_URL="postgresql+asyncpg://energyhub:${PG_PW}@postgres-service:5432/authdb"             --from-literal=CLIENT_DATABASE_URL="postgresql+asyncpg://energyhub:${PG_PW}@postgres-service:5432/clientdb"             --from-literal=CONTRACT_DATABASE_URL="postgresql+asyncpg://energyhub:${PG_PW}@postgres-service:5432/contractdb"             --from-literal=FINANCIAL_DATABASE_URL="postgresql+asyncpg://energyhub:${PG_PW}@postgres-service:5432/financialdb"             --from-literal=AUDIT_DATABASE_URL="postgresql+asyncpg://energyhub:${PG_PW}@postgres-service:5432/auditdb"             --from-literal=RABBITMQ_URL="amqp://energyhub:${MQ_PW}@rabbitmq-service:5672/"

      # Validação server-side de TODOS os manifestos contra a API real do cluster (schema + admission).
      # `k8s/cert-manager/` e `k8s/secrets/` ficam FORA da varredura (`-f k8s/` e nao-recursivo): ambos
      # dependem de controllers (cert-manager / sealed-secrets) que o kind do CI nao instala.
      - name: Server-side dry-run of all manifests
        run: kubectl apply --dry-run=server -f k8s/

      - name: Apply manifests
        run: kubectl apply -f k8s/

      # Runner tem RAM limitada (8–16GB): réplicas dos serviços em 1 para caber (backends já são 1).
      - name: Scale services to 1 replica (runner RAM)
        run: |
          for s in auth client contract financial audit; do
            kubectl -n energyhub scale deployment/${s}-service --replicas=1
          done

      # Gate num subconjunto CORE e confiável (Postgres/Redis/RabbitMQ/Consul + auth/client). Não
      # bloqueia em Kafka/Zookeeper (pesados/lentos num runner) — eles são aplicados, não aguardados.
      - name: Wait for core stack to be ready
        run: |
          kubectl -n energyhub wait --for=condition=available --timeout=240s \
            deployment/postgres deployment/redis deployment/rabbitmq deployment/consul
          kubectl -n energyhub wait --for=condition=available --timeout=300s \
            deployment/auth-service deployment/client-service

      # Prova que o pull secret FUNCIONA — e não que ele apenas existe.
      #
      # Cuidado com o falso-positivo: os Deployments normais NÃO exercitam o pull. As imagens são
      # pré-carregadas no kind com `kind load` sob outro nome (energyhub-<svc>-service:latest) e com
      # imagePullPolicy IfNotPresent, então o kubelet nunca fala com o GHCR — o deploy ficaria verde
      # mesmo com o pull secret quebrado, e num cluster real tudo cairia em ImagePullBackOff.
      #
      # Este probe fecha esse buraco: referencia a imagem pelo nome REMOTO E PRIVADO
      # (ghcr.io/<owner>/...:<sha>, que NÃO está no nó) com imagePullPolicy Always, forçando um pull
      # autenticado real. A imagem é privada (GET anônimo no manifest devolve 401), logo só sobe se
      # o SA entregou a credencial.
      #
      # O `command: [sleep, 600]` do pod sobrepõe o uvicorn: aqui se testa o PULL, não o app — sem
      # isso o container morreria por falta de banco e confundiria o diagnóstico. E o sleep é MUITO
      # maior que o timeout do wait de propósito: com um sleep curto o container poderia terminar
      # antes de o wait observar Ready, o pod iria a Succeeded (Ready=False para sempre) e o wait
      # travaria até o timeout — reportando FALHA numa verificação que na verdade PASSOU.
      #
      # ATENÇÃO ao editar o heredoc abaixo: ele é NÃO-quotado (`<<EOF`), porque precisa expandir
      # ${OWNER} e ${GITHUB_SHA}. Isso significa que o bash também faz SUBSTITUIÇÃO DE COMANDO no
      # corpo — qualquer texto entre crases é EXECUTADO, inclusive dentro de um "comentário" YAML.
      # Não use crases nem `$(...)` aqui. (Um comentário com crases já causou exatamente isso: o
      # bash rodou o comando e ainda apagou a palavra do comentário aplicado.)
      - name: "Verify GHCR pull secret pulls a PRIVATE image"
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: ghcr-pull-probe
            namespace: energyhub
          spec:
            serviceAccountName: energyhub-sa
            restartPolicy: Never
            containers:
              - name: probe
                image: ghcr.io/${OWNER}/energyhub-auth-service:${GITHUB_SHA}
                imagePullPolicy: Always
                command: ["sleep", "600"]
          EOF
          if kubectl -n energyhub wait --for=condition=Ready pod/ghcr-pull-probe --timeout=180s; then
            echo "OK: imagem PRIVADA do GHCR puxada via ghcr-pull-secret (sem ImagePullBackOff)."
            kubectl -n energyhub delete pod ghcr-pull-probe --wait=false || true
          else
            echo "::error::pull da imagem privada FALHOU — ghcr-pull-secret/energyhub-sa nao autenticaram."
            kubectl -n energyhub describe pod ghcr-pull-probe | tail -25
            exit 1
          fi

      # Drill de rollback: injeta uma imagem quebrada, confirma que o rollout NÃO conclui, reverte
      # com `rollout undo` e confirma a recuperação — prova o mecanismo de auto-rollback do CD.
      - name: Rollback drill (injected failure)
        run: |
          kubectl -n energyhub set image deployment/auth-service auth-service=energyhub-auth-service:does-not-exist
          if kubectl -n energyhub rollout status deployment/auth-service --timeout=60s; then
            echo "ERRO: rollout com imagem inexistente deveria falhar" && exit 1
          fi
          echo "rollout falhou como esperado — revertendo..."
          kubectl -n energyhub rollout undo deployment/auth-service
          kubectl -n energyhub rollout status deployment/auth-service --timeout=180s
          echo "rollback recuperou o auth-service ✅"

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n energyhub -o wide || true
          kubectl get events -n energyhub --sort-by=.lastTimestamp | tail -30 || true
