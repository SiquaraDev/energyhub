# Docker — constrói uma imagem por serviço (matrix + Buildx) e publica no GHCR — Fase 17 · CI.
# Roda em push para main/master/develop e em PR para main/master (PR só constrói, não publica).
#
# Registry: GHCR (ghcr.io) — grátis para imagens públicas e autenticado pelo GITHUB_TOKEN (sem
# secret externo). O owner do repo (`SiquaraDev`) DEVE ir minúsculo no ref OCI. Para trocar por
# Docker Hub/ECR, muda-se só o passo de login e o prefixo das tags (ver docs/ci-cd.md).
#
# Gateway: NÃO há imagem `api-gateway` — o gateway é o Traefik (imagem oficial, não construída aqui);
# por isso a matriz cobre só os 5 serviços com Dockerfile em services/<serviço>/.
#
# Supply chain (harden-cicd-supply-chain): actions fixadas por SHA imutável + release em comentário;
# Dependabot mantém os pins frescos. As imagens publicadas carregam attestation de PROVENANCE (de
# qual commit/workflow saíram) e SBOM (inventário de componentes) — ver o passo de build abaixo.
name: Docker

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Escopo mínimo por padrão; o job eleva packages: write (só publica em push, não em PR).
permissions:
  contents: read

# Um push mais novo no mesmo ref cancela o run em voo — evita duas matrizes disputando as MESMAS
# tags `:latest` no GHCR (a mais lenta poderia sobrescrever a mais nova).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, client-service, contract-service, financial-service, audit-service]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: latest

      # Login só quando vai publicar (push events). Em PR, apenas constrói (valida o Dockerfile).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action gera as tags (latest + SHA) e os labels OCI, e MINUSCULIZA o owner
      # (SiquaraDev → siquaradev) automaticamente — sem interpolar env dinâmico em expressões.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/energyhub-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./services/${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Attestations SLSA: provenance (de qual commit/workflow/builder a imagem saiu) e SBOM
          # (inventário de componentes) — shorthands de `--attest`, sem default no action.
          # Condicionados ao MESMO gate do `push` acima: são anexadas ao índice OCI no registry, e
          # num PR não há publicação — logo, não há onde anexá-las. Em push, a tag publicada vira
          # um image index com o manifesto da imagem + o da attestation (`docker pull`/`manifest
          # inspect`/`kind load` seguem funcionando; resolvem a plataforma normalmente).
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          # Cache de camadas via GitHub Actions cache (escopo por serviço), mode=max cobre as
          # camadas intermediárias do multi-stage. Alternativa "registry-backed" (type=registry
          # para ghcr.io/.../buildcache) documentada em docs/ci-cd.md.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
