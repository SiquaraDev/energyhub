# Regras de alerta do Prometheus — EnergyHub (Fase 12).
# Thresholds/`for` são pontos de partida (ajustar contra baselines reais).
groups:
  - name: energyhub-alerts
    rules:
      # Latência p95 das requisições acima de 1s por 5m.
      - alert: HighRequestLatency
        expr: >
          histogram_quantile(0.95,
            sum(rate(fastapi_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latência de requisições alta (p95 > 1s)"
          description: "A latência p95 está acima de 1s há mais de 5 minutos."

      # Mais de 5% de respostas 5xx por 5m.
      - alert: HighErrorRate
        expr: >
          sum(rate(fastapi_requests_total{status="5xx"}[5m]))
            / sum(rate(fastapi_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Taxa de erro 5xx alta (> 5%)"
          description: "Mais de 5% das requisições retornam 5xx há mais de 5 minutos."

      # Memória disponível do host abaixo de ~500 MB por 5m.
      - alert: LowMemory
        expr: memory_available_bytes < 500000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memória disponível baixa (< 500 MB)"
          description: "A memória disponível do host está abaixo de 500 MB há mais de 5 minutos."
