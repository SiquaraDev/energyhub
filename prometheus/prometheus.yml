# Configuração do Prometheus — EnergyHub (Fase 12).
# O app roda no host (uvicorn :8000); o Prometheus (container) o scrapeia via host.docker.internal.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Aplicação EnergyHub (endpoint /metrics).
  - job_name: energyhub
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000

  # O próprio Prometheus (auto-monitoramento).
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
