# Configuração do Prometheus — EnergyHub (Fase 12, atualizada na Fase 14).
# A API agora roda na stack (serviço `energyhub-api`); o Prometheus a scrapeia por nome de serviço
# na rede compartilhada (`energyhub-api:8000`), não mais via host.docker.internal.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Aplicação EnergyHub (endpoint /metrics) — alcançada pelo nome do serviço na rede do compose.
  - job_name: energyhub
    metrics_path: /metrics
    static_configs:
      - targets:
          - energyhub-api:8000

  # O próprio Prometheus (auto-monitoramento).
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
