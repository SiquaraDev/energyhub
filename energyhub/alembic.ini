# Configuração do Alembic — EnergyHub.
#
# A URL de conexão NÃO é definida aqui: `alembic/env.py` a carrega de
# `energyhub.config.settings.database_url` (fonte única de configuração).

[alembic]
# Localização dos scripts de migração (relativa a este arquivo).
script_location = alembic

# Garante que o pacote `energyhub` (layout src/) seja importável ao rodar o CLI.
prepend_sys_path = src

# Nome dos arquivos de migração: prefixo UTC + revisão + slug, para ordenação
# cronológica e não-ambígua entre timezones.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timestamps das migrações em UTC.
timezone = UTC

# Placeholder — sobrescrito em env.py por settings.database_url.
sqlalchemy.url = postgresql+asyncpg://localhost/energyhub


[post_write_hooks]
# Nenhum hook de formatação automática configurado.


# Configuração de logging.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
